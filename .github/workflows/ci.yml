name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-foundation:
    name: Repository Foundation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify folder structure
        run: npm run verify:structure

      - name: Prettier check
        run: npm run format:check

      - name: ESLint (scripts)
        run: npm run lint

      - name: Validate deployment compose
        run: docker compose -f deployment/docker-compose.yml config

      - name: Build workspaces
        run: npm run build

      - name: Test workspaces
        run: npm run test
